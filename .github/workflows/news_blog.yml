name: holyyomi AI Blog Automation

# 운영 방침(2026-07-03): 이 블로그는 AI 주제를 하루 1회만 자동 발행한다 —
# 자동 발행은 ai_blog.yml(매일 07:05 KST) 하나만 사용한다.
# 이 워크플로우의 30분 주기 schedule은 제거했고, 수동 실행(workflow_dispatch)만
# 스모크 테스트/수동 발행 용도로 남긴다.
on:
  workflow_dispatch:
    inputs:
      publish_mode:
        description: 'News publish mode'
        required: true
        default: 'publish'
        type: choice
        options:
          - publish
          - dry_run
      manual_dedup_bypass:
        description: 'Manual publish only: bypass recent topic dedup'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
      allow_evergreen_publish:
        description: 'Manual publish only: allow evergreen fallback auto publish (quality gates still apply)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

concurrency:
  group: news-blog-publish
  cancel-in-progress: false

jobs:
  news_run:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Check Schedule Gate
        id: schedule_gate
        if: ${{ github.event_name == 'schedule' }}
        env:
          NEWS_SCHEDULE_TIMEZONE: "Asia/Seoul"
          NEWS_SCHEDULE_SLOTS: "08:58, 18:58"
          NEWS_DAILY_PUBLISH_TARGET: "2"
          NEWS_FAILED_SCHEDULE_INTERVAL_MINUTES: "20"
        run: |
          python tools/should_run_news_schedule.py

      - name: Log Schedule Skip
        if: ${{ github.event_name == 'schedule' && steps.schedule_gate.outputs.should_run != 'true' }}
        run: |
          echo "Schedule gate skipped this wake-up."
          echo "reason=${{ steps.schedule_gate.outputs.reason }}"
          echo "slot_start_at=${{ steps.schedule_gate.outputs.slot_start_at }}"
          echo "slot_end_at=${{ steps.schedule_gate.outputs.slot_end_at }}"
          echo "next_run_at=${{ steps.schedule_gate.outputs.next_run_at }}"

      - name: Install Dependencies
        if: ${{ github.event_name == 'workflow_dispatch' || steps.schedule_gate.outputs.should_run == 'true' }}
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Validate News Environment
        if: ${{ github.event_name == 'workflow_dispatch' || steps.schedule_gate.outputs.should_run == 'true' }}
        env:
          DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.publish_mode == 'dry_run' && 'true' || 'false' }}
          NEWS_PUBLISH_MODE: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.publish_mode || 'publish' }}
          AUTO_PUBLISH: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.publish_mode == 'dry_run' && 'false' || 'true' }}
          GOOGLE_SEARCH_API_KEY: ${{ secrets.GOOGLE_SEARCH_API_KEY }}
          GOOGLE_SEARCH_CX: ${{ secrets.GOOGLE_SEARCH_CX }}
          ENABLE_GOOGLE_CUSTOM_SEARCH: "true"
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_MODEL: "nvidia/nemotron-3-ultra-550b-a55b:free"
          OPENROUTER_MODEL_FALLBACK: "openai/gpt-oss-120b:free"
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: "gpt-4o-mini"
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
          ENABLE_NAVER_SEARCH: "true"
          ENABLE_NAVER_DATALAB: "true"
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          EXA_API_KEY: ${{ secrets.EXA_API_KEY }}
          FIRECRAWL_API_KEY: ${{ secrets.FIRECRAWL_API_KEY }}
          ENABLE_TAVILY_SEARCH: "true"
          ENABLE_EXA_SEARCH: "true"
          ENABLE_FIRECRAWL_SEARCH: "true"
          BLOGGER_CLIENT_ID: ${{ secrets.BLOGGER_CLIENT_ID }}
          BLOGGER_CLIENT_SECRET: ${{ secrets.BLOGGER_CLIENT_SECRET }}
          BLOGGER_REFRESH_TOKEN: ${{ secrets.BLOGGER_REFRESH_TOKEN }}
          BLOGGER_BLOG_ID: ${{ secrets.BLOGGER_BLOG_ID }}
          BLOGSPOT_HOME_URL: "https://holyyomiai.blogspot.com/"
          BLOG_BRAND_NAME: "holyyomi AI"
          BLOG_AUTHOR_NAME: "holyyomi AI"
          AI_COVER_IMAGE_URL: ${{ secrets.AI_COVER_IMAGE_URL }}
          AI_DEFAULT_COVER_IMAGE_URL: "https://raw.githubusercontent.com/holyyomi/ai_google_blog/main/assets/ai-blog-cover-default.png"
          AI_IMAGE_UPLOAD_KEY: ${{ secrets.AI_IMAGE_UPLOAD_KEY }}
          IMGBB_API_KEY: ${{ secrets.IMGBB_API_KEY }}
        run: |
          PYTHONPATH=src python scripts/validate_news_env.py --strict

      - name: Run News Pipeline
        if: ${{ github.event_name == 'workflow_dispatch' || steps.schedule_gate.outputs.should_run == 'true' }}
        env:
          DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.publish_mode == 'dry_run' && 'true' || 'false' }}
          NEWS_PUBLISH_MODE: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.publish_mode || 'publish' }}
          PUBLISH_HOLD_PHASE2: "false"
          AUTO_PUBLISH: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.publish_mode == 'dry_run' && 'false' || 'true' }}
          NEWS_MANUAL_DEDUP_BYPASS: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.manual_dedup_bypass == 'true' && github.event.inputs.publish_mode == 'publish' && 'true' || 'false' }}
          # 수동 실행 전용: 운영자가 명시적으로 켠 경우에만 evergreen 자동발행 허용 (품질 게이트는 그대로)
          ALLOW_EVERGREEN_AUTO_PUBLISH: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.allow_evergreen_publish == 'true' && github.event.inputs.publish_mode == 'publish' && 'true' || 'false' }}
          NEWS_MAX_PUBLISH_ATTEMPTS: "12"
          DISABLE_IMAGE_GENERATION: "true"
          DISABLE_IMAGE_UPLOAD: "true"
          AI_COVER_IMAGE_URL: ${{ secrets.AI_COVER_IMAGE_URL }}
          AI_DEFAULT_COVER_IMAGE_URL: "https://raw.githubusercontent.com/holyyomi/ai_google_blog/main/assets/ai-blog-cover-default.png"
          REQUIRE_NEWS_COVER_IMAGE: "false"
          # 커버 이미지 자동 생성 (Cloudflare 무료 1순위 → Gemini 2순위 → imgbb 호스팅, 비치명)
          ENABLE_COVER_IMAGE_AUTOGEN: "false"
          AI_IMAGE_UPLOAD_KEY: ${{ secrets.AI_IMAGE_UPLOAD_KEY }}
          IMGBB_API_KEY: ${{ secrets.IMGBB_API_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          NEWS_MODE: "news"
          AI_BLOG_MODE: "true"
          AI_BLOG_AUTO_PUBLISH: "true"
          NEWS_EXCLUDED_QUERY_GROUPS: ""
          ALLOW_AI_NEWS_TOPICS: "true"
          MIN_TOPIC_SCORE: "75"
          TOPIC_CANDIDATE_LIMIT: "120"
          DEDUP_DAYS: "7"
          TITLE_CANDIDATE_COUNT: "10"
          RUNS_DIR: "runs"
          GOOGLE_SEARCH_API_KEY: ${{ secrets.GOOGLE_SEARCH_API_KEY }}
          GOOGLE_SEARCH_CX: ${{ secrets.GOOGLE_SEARCH_CX }}
          ENABLE_GOOGLE_CUSTOM_SEARCH: "true"
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
          ENABLE_NAVER_SEARCH: "true"
          ENABLE_NAVER_DATALAB: "true"
          NEWS_NAVER_SEARCH_TYPES: "news,webkr"
          NEWS_NAVER_MAX_REQUESTS: "36"
          NEWS_NAVER_DISPLAY: "10"
          NEWS_NAVER_DATALAB_MAX_REQUESTS: "5"
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          EXA_API_KEY: ${{ secrets.EXA_API_KEY }}
          FIRECRAWL_API_KEY: ${{ secrets.FIRECRAWL_API_KEY }}
          ENABLE_TAVILY_SEARCH: "true"
          ENABLE_EXA_SEARCH: "true"
          ENABLE_FIRECRAWL_SEARCH: "true"
          NEWS_TAVILY_MAX_REQUESTS: "3"
          NEWS_EXA_MAX_REQUESTS: "3"
          NEWS_FIRECRAWL_MAX_REQUESTS: "1"
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_MODEL: "nvidia/nemotron-3-ultra-550b-a55b:free"
          OPENROUTER_MODEL_FALLBACK: "openai/gpt-oss-120b:free"
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: "gpt-4o-mini"
          BLOGGER_CLIENT_ID: ${{ secrets.BLOGGER_CLIENT_ID }}
          BLOGGER_CLIENT_SECRET: ${{ secrets.BLOGGER_CLIENT_SECRET }}
          BLOGGER_REFRESH_TOKEN: ${{ secrets.BLOGGER_REFRESH_TOKEN }}
          BLOGGER_BLOG_ID: ${{ secrets.BLOGGER_BLOG_ID }}
          BLOGSPOT_HOME_URL: "https://holyyomiai.blogspot.com/"
          BLOG_BRAND_NAME: "holyyomi AI"
          BLOG_AUTHOR_NAME: "holyyomi AI"
        run: |
          PYTHONPATH=src python src/blogspot_automation/cli_news.py

      - name: Normalize Publish History
        if: ${{ always() && (github.event_name == 'workflow_dispatch' || steps.schedule_gate.outputs.should_run == 'true') }}
        run: |
          PYTHONPATH=src python tools/sync_publish_history.py --verify-live-urls

      - name: Audit Live AI Blog
        if: ${{ always() && (github.event_name == 'workflow_dispatch' || steps.schedule_gate.outputs.should_run == 'true') }}
        run: |
          PYTHONPATH=src python scripts/audit_ai_blog_live.py --strict --blog-url https://holyyomiai.blogspot.com/

      - name: List Runs Output
        if: ${{ always() && (github.event_name == 'workflow_dispatch' || steps.schedule_gate.outputs.should_run == 'true') }}
        run: |
          if [ -d runs ]; then
            find runs -maxdepth 3 -type f -print
          else
            echo "runs directory not found"
          fi

      - name: Ensure Runs Artifact Placeholder
        if: ${{ always() && (github.event_name == 'workflow_dispatch' || steps.schedule_gate.outputs.should_run == 'true') }}
        run: |
          mkdir -p runs
          if ! find runs -type f -print -quit | grep -q .; then
            {
              echo "No files were produced under runs/."
              date -u +"generated_at_utc=%Y-%m-%dT%H:%M:%SZ"
            } > runs/no_artifacts_found.txt
          fi

      - name: Upload News Run Output
        if: ${{ always() && (github.event_name == 'workflow_dispatch' || steps.schedule_gate.outputs.should_run == 'true') }}
        uses: actions/upload-artifact@v4
        with:
          name: news-run-output
          path: runs/
          if-no-files-found: warn

      - name: Persist Publish History
        if: ${{ always() && (github.event_name == 'workflow_dispatch' || steps.schedule_gate.outputs.should_run == 'true') }}
        run: |
          if git status --short data/publish_history.json | grep -q .; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git pull --rebase --autostash origin "${{ github.ref_name }}"
            git add data/publish_history.json
            git commit -m "chore: update publish history [skip ci]"
            git push origin HEAD:${{ github.ref_name }}
          else
            echo "data/publish_history.json unchanged, skipping commit"
          fi
