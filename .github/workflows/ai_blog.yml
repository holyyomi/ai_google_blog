name: holyyomi Fresh AI Issue Blog

# cli_ai.py compatibility workflow.
# The retired Naver Blog rewrite path is not used; cli_ai delegates to fresh AI/news discovery.
on:
  schedule:
    # 22:05 UTC = 익일 07:05 KST. 정각(0분) 회피로 GitHub cron 지연 완화.
    - cron: '5 22 * * *'
  workflow_dispatch:
    inputs:
      publish_mode:
        description: 'AI publish mode'
        required: true
        default: 'dry_run'
        type: choice
        options:
          - dry_run
          - publish
      force_topic:
        description: 'Optional: forced topic (blank = fresh AI/news discovery)'
        required: false
        default: ''
        type: string

concurrency:
  group: ai-blog-publish
  cancel-in-progress: false

jobs:
  ai_run:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run AI Topic Pipeline
        env:
          # schedule(매일 아침)이면 무조건 발행, 수동(dispatch)이면 publish_mode 입력에 따름
          DRY_RUN: ${{ github.event_name == 'schedule' && 'false' || (github.event.inputs.publish_mode == 'publish' && 'false' || 'true') }}
          AUTO_PUBLISH: ${{ github.event_name == 'schedule' && 'true' || (github.event.inputs.publish_mode == 'publish' && 'true' || 'false') }}
          NEWS_PUBLISH_MODE: ${{ github.event_name == 'schedule' && 'publish' || github.event.inputs.publish_mode }}
          AI_FORCE_TOPIC: ${{ github.event.inputs.force_topic }}
          NEWS_MODE: "news"
          AI_BLOG_MODE: "true"
          AI_BLOG_AUTO_PUBLISH: "true"
          ALLOW_AI_NEWS_TOPICS: "true"
          NEWS_EXCLUDED_QUERY_GROUPS: ""
          MIN_TOPIC_SCORE: "75"
          TOPIC_CANDIDATE_LIMIT: "120"
          DEDUP_DAYS: "7"
          TITLE_CANDIDATE_COUNT: "10"
          # LLM 주제 특화 본문 생성
          ENABLE_AI_LLM_ENRICH: "true"
          ENABLE_GOOGLE_CUSTOM_SEARCH: "true"
          GOOGLE_SEARCH_API_KEY: ${{ secrets.GOOGLE_SEARCH_API_KEY }}
          GOOGLE_SEARCH_CX: ${{ secrets.GOOGLE_SEARCH_CX }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_MODEL: "nvidia/nemotron-3-ultra-550b-a55b:free"
          OPENROUTER_MODEL_FALLBACK: "openai/gpt-oss-120b:free"
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: "gpt-5-mini"
          # Disable generated covers because image models often render broken Korean text.
          DISABLE_IMAGE_GENERATION: "true"
          DISABLE_IMAGE_UPLOAD: "true"
          ENABLE_COVER_IMAGE_AUTOGEN: "false"
          REQUIRE_NEWS_COVER_IMAGE: "false"
          AI_IMAGE_UPLOAD_KEY: ${{ secrets.AI_IMAGE_UPLOAD_KEY }}
          IMGBB_API_KEY: ${{ secrets.IMGBB_API_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          # Naver Blog rewrite is disabled. Fresh discovery uses Google RSS + Tavily/Exa/Firecrawl.
          ENABLE_NAVER_SEARCH: "false"
          ENABLE_NAVER_DATALAB: "false"
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          EXA_API_KEY: ${{ secrets.EXA_API_KEY }}
          FIRECRAWL_API_KEY: ${{ secrets.FIRECRAWL_API_KEY }}
          ENABLE_TAVILY_SEARCH: "true"
          ENABLE_EXA_SEARCH: "true"
          ENABLE_FIRECRAWL_SEARCH: "true"
          NEWS_TAVILY_MAX_REQUESTS: "3"
          NEWS_EXA_MAX_REQUESTS: "1"
          NEWS_FIRECRAWL_MAX_REQUESTS: "1"
          # 색인 즉시 요청 (Bing·Naver IndexNow) — 키 없으면 안전하게 skip
          NAVER_INDEXNOW_KEY: ${{ secrets.NAVER_INDEXNOW_KEY }}
          NAVER_INDEXNOW_KEY_LOCATION: ${{ secrets.NAVER_INDEXNOW_KEY_LOCATION }}
          # Blogger 발행 (publish 모드에서만 실제 사용)
          BLOGGER_CLIENT_ID: ${{ secrets.BLOGGER_CLIENT_ID }}
          BLOGGER_CLIENT_SECRET: ${{ secrets.BLOGGER_CLIENT_SECRET }}
          BLOGGER_REFRESH_TOKEN: ${{ secrets.BLOGGER_REFRESH_TOKEN }}
          BLOGGER_BLOG_ID: ${{ secrets.BLOGGER_BLOG_ID }}
          BLOGSPOT_HOME_URL: "https://holyyomiai.blogspot.com/"
          BLOG_BRAND_NAME: "holyyomi AI"
          BLOG_AUTHOR_NAME: "holyyomi AI"
          RUNS_DIR: "runs"
        run: |
          PYTHONPATH=src python src/blogspot_automation/cli_ai.py

      - name: List Runs Output
        if: ${{ always() }}
        run: |
          if [ -d runs ]; then
            find runs -maxdepth 3 -type f -print
          else
            echo "runs directory not found"
          fi

      - name: Ensure Runs Artifact Placeholder
        if: ${{ always() }}
        run: |
          mkdir -p runs
          if ! find runs -type f -print -quit | grep -q .; then
            {
              echo "No files were produced under runs/."
              date -u +"generated_at_utc=%Y-%m-%dT%H:%M:%SZ"
            } > runs/no_artifacts_found.txt
          fi

      - name: Upload AI Run Output
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: ai-run-output
          path: runs/
          if-no-files-found: warn

      # Keep publish history so recent-topic dedup works across scheduled runs.
      - name: Persist Publish History
        if: ${{ always() && github.ref_name == 'main' }}
        run: |
          CHANGED=""
          for f in data/publish_history.json; do
            if [ -f "$f" ] && ! git diff --quiet -- "$f" 2>/dev/null; then CHANGED="yes"; fi
            if [ -f "$f" ] && ! git ls-files --error-unmatch "$f" >/dev/null 2>&1; then CHANGED="yes"; fi
          done
          if [ -n "$CHANGED" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git pull --rebase --autostash origin main
            git add data/publish_history.json
            git commit -m "chore: update publish history [skip ci]" || echo "nothing to commit"
            git push origin HEAD:main
          else
            echo "Publish history unchanged, skipping commit"
          fi

