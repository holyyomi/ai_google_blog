name: holyyomi Fresh AI Issue Blog

# cli_ai.py compatibility workflow.
# The retired Naver Blog rewrite path is not used; cli_ai delegates to fresh AI/news discovery.
on:
  schedule:
    # 하루 1회 발행 (2026-07-22 운영 방침 전환): 색인 0·애드센스 심사 단계라
    # 물량보다 품질 — 아침 슬롯은 중단(Cloud Scheduler ai-blog-morning도 PAUSED).
    # 발행 시각은 US-first 영어 블로그 타겟 기준: 12:31 UTC ≈ 미국 동부
    # 아침 8:31(EDT)·영국 오후 1:31·인도 저녁 6:01 — 주 독자층의 활동 시간대.
    # Cloud Scheduler(ai-blog-evening, 12:50 UTC)와 19분 간격 유지 —
    # entrypoint.sh의 "최근 90분 내 GHA run 존재?" 핸드셰이크 전제.
    # 정각(0분) 회피로 GitHub cron 지연 완화.
    - cron: '31 12 * * *'
  workflow_dispatch:
    inputs:
      publish_mode:
        description: 'AI publish mode (publish_draft = 최종 계약까지 검증하되 Blogger 초안으로만 — 라이브 오염 0)'
        required: true
        default: 'dry_run'
        type: choice
        options:
          - dry_run
          - publish_draft
          - publish
      force_topic:
        description: 'Optional: forced topic (blank = fresh AI/news discovery)'
        required: false
        default: ''
        type: string

concurrency:
  group: ai-blog-publish
  cancel-in-progress: false

jobs:
  ai_run:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # 2026-07-20 GHA Actions-minute 한도 소진 대응: 이번 슬롯이 소진 상태인지
      # 매번 다시 판단하지 않고, 사용자 결정(2026-07-21)으로 7월 한 달은 schedule
      # 자동실행을 통째로 건너뛰고 Cloud Run(ai-blog-pipeline job)을 1순위로 둔다.
      # entrypoint.sh에도 동일한 2026-08-01 KST 기준 날짜 게이트가 있어 두 시스템이
      # 같은 슬롯을 중복 발행하던 문제(07/20~21 실측: 슬롯당 2건 발행)를 없앤다.
      # 수동 workflow_dispatch(리허설/스모크 테스트)는 날짜와 무관하게 항상 동작한다
      # — CLAUDE.md 머지 조건(발행 경로 변경 시 publish_draft 리허설 필수)을 유지하기 위함.
      # 2026-08-01부터는 이 스텝이 자동으로 run=true를 내놓아 별도 코드 변경 없이
      # GHA가 다시 1순위로 복귀한다.
      - name: Compute July quota-recovery gate
        id: gate
        run: |
          NOW_KST=$(TZ=Asia/Seoul date +%Y-%m-%d)
          if [[ "${{ github.event_name }}" == "schedule" && "$NOW_KST" < "2026-08-01" ]]; then
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "[gate] 2026-07-31까지 schedule 자동실행 건너뜀 (Cloud Run이 1순위). 2026-08-01부터 자동 복귀. today(KST)=$NOW_KST"
          else
            echo "run=true" >> "$GITHUB_OUTPUT"
            echo "[gate] 정상 실행. event=${{ github.event_name }} today(KST)=$NOW_KST"
          fi

      - name: Set up Python
        if: steps.gate.outputs.run == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        if: steps.gate.outputs.run == 'true'
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      # Search Console 성과 루프 — 실제 검색 성과를 받아 주제 선정에 반영.
      # GSC_SERVICE_ACCOUNT_JSON secret이 없으면 조용히 스킵 (발행 흐름 영향 없음).
      - name: Fetch Search Console Performance
        if: steps.gate.outputs.run == 'true'
        env:
          GSC_SERVICE_ACCOUNT_JSON: ${{ secrets.GSC_SERVICE_ACCOUNT_JSON }}
          BLOGSPOT_HOME_URL: "https://holyyomiai.blogspot.com/"
        run: |
          PYTHONPATH=src python scripts/fetch_search_performance.py || echo "search performance fetch skipped"

      - name: Run AI Topic Pipeline
        if: steps.gate.outputs.run == 'true'
        env:
          # schedule(매일 아침·저녁)이면 무조건 라이브 발행, 수동(dispatch)이면 publish_mode 입력에 따름.
          # publish_draft/publish 둘 다 실제 발행 경로(DRY_RUN=false)를 타되,
          # publish_draft는 아래 NEWS_PUBLISH_AS_DRAFT=true로 Blogger 초안까지만 만든다.
          # 배경: 과거 수동 publish "리허설"이 라이브에 실제 글을 쌓아 중복(네이버 AI 3연속)을
          # 만들었음. 이제 수동 검증은 publish_draft로 하고, 라이브 발행은 스케줄만 한다.
          DRY_RUN: ${{ (github.event_name == 'schedule' || github.event.inputs.publish_mode == 'publish' || github.event.inputs.publish_mode == 'publish_draft') && 'false' || 'true' }}
          AUTO_PUBLISH: ${{ (github.event_name == 'schedule' || github.event.inputs.publish_mode == 'publish' || github.event.inputs.publish_mode == 'publish_draft') && 'true' || 'false' }}
          NEWS_PUBLISH_MODE: ${{ (github.event_name == 'schedule' || github.event.inputs.publish_mode == 'publish' || github.event.inputs.publish_mode == 'publish_draft') && 'publish' || 'dry_run' }}
          # 수동 publish_draft일 때만 초안. 스케줄·수동 publish는 라이브(빈 입력이면 자동으로 false).
          NEWS_PUBLISH_AS_DRAFT: ${{ github.event.inputs.publish_mode == 'publish_draft' && 'true' || 'false' }}
          # news_blog.yml과 동일한 정책: PUBLISH_HOLD_PHASE2는 항상 false로 둔다.
          # (실제 발행 여부는 DRY_RUN/AUTO_PUBLISH가 따로 통제하므로 안전함.)
          # 이 값이 없으면 news_pipeline.py의 기본값이 "true"라 human_review_required가
          # 항상 True가 되어, golden pattern 매칭/등급과 무관하게 모든 실행이 held_for_review로
          # 막힌다 — ai_blog.yml에 이 줄이 누락된 것이 2026-07-03 이후 발행이 전혀 안 된 근본 원인.
          PUBLISH_HOLD_PHASE2: "false"
          AI_FORCE_TOPIC: ${{ github.event.inputs.force_topic }}
          NEWS_MODE: "news"
          AI_BLOG_MODE: "true"
          AI_BLOG_AUTO_PUBLISH: "true"
          ALLOW_AI_NEWS_TOPICS: "true"
          NEWS_EXCLUDED_QUERY_GROUPS: ""
          MIN_TOPIC_SCORE: "75"
          TOPIC_CANDIDATE_LIMIT: "120"
          DEDUP_DAYS: "7"
          TITLE_CANDIDATE_COUNT: "10"
          # 1등 후보가 발행 게이트에 막히면 다음 후보로 재시도 (news_blog.yml과 동일값).
          # 이 값이 없으면 기본 1 → 첫 후보가 막히는 순간 그날 발행 자체가 스킵됨 (실측 확인, 2026-07-10).
          NEWS_MAX_PUBLISH_ATTEMPTS: "12"
          # 2026-07-10 사용자 결정: 신선 뉴스 후보가 바닥나 에버그린 폴백으로 넘어간
          # 경우도, 다른 모든 발행 품질 게이트(구체성/원문보존/해시태그/제목-본문 정합 등)를
          # 통과하면 자동발행 허용. "최신 이슈만" 원칙 때문에 게이트를 이미 통과한 글까지
          # 막아 발행 0건이 되는 문제를 막는다 (evergreen_axis_repeated_3x 등 다른 게이트는 그대로 유지).
          ALLOW_EVERGREEN_AUTO_PUBLISH: "true"
          # LLM 주제 특화 본문 생성
          ENABLE_AI_LLM_ENRICH: "true"
          # Custom Search JSON API는 Google이 신규 고객에게 폐쇄(2026-07-10 확정:
          # API 활성화·새 키 발급 후에도 전 호출 403 "This project does not have
          # the access" — 콘솔 설정으로 해결 불가, 기존 고객도 2027-01 마이그레이션
          # 공지). 매 실행 무의미한 403 호출을 없애고 Google News RSS 폴백을
          # 직행 경로로 쓴다. 팩트 소스 업그레이드는 Tavily 크레딧 복구 후 재검토.
          ENABLE_GOOGLE_CUSTOM_SEARCH: "false"
          GOOGLE_SEARCH_API_KEY: ${{ secrets.GOOGLE_SEARCH_API_KEY }}
          GOOGLE_SEARCH_CX: ${{ secrets.GOOGLE_SEARCH_CX }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_MODEL: "nvidia/nemotron-3-ultra-550b-a55b:free"
          # 2026-07-18: 기존 openai/gpt-oss-120b:free가 OpenRouter 카탈로그에서
          # 사라져 2차 폴백이 항상 실패했다(실측: 라이브 실행에서 매번 404).
          # 1차(nemotron, NVIDIA)와 인프라를 공유하지 않도록 일부러 다른 회사
          # 모델(Google Gemma)로 골랐다 — 같은 회사 계열 장애가 1·2차를 동시에
          # 막는 걸 피하기 위함. 같은 계열 31b는 이 시점 업스트림(Google AI
          # Studio) 혼잡으로 429가 났고, 26b는 API 직접 호출로 정상 200 확인.
          # openrouter.ai/collections/free-models로 생존 여부를 주기적으로
          # 재확인할 것 — 무료 모델은 카탈로그에서 예고 없이 빠질 수 있다.
          OPENROUTER_MODEL_FALLBACK: "google/gemma-4-26b-a4b-it:free"
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: "gpt-5-mini"
          # 2026-07-10 재활성화: cover_image_service의 _STYLE_SUFFIX가 wordless/textless를
          # 강제해 한글 텍스트 깨짐 문제를 완화했음 확인 후 재개. (과거 DISABLE_IMAGE_GENERATION/
          # DISABLE_IMAGE_UPLOAD는 어떤 코드도 읽지 않는 죽은 env였음 — 2026-07-08 env 계약
          # 테스트로 확인 후 제거. 실제 on/off는 아래 ENABLE_COVER_IMAGE_AUTOGEN이 담당.)
          ENABLE_COVER_IMAGE_AUTOGEN: "true"
          REQUIRE_NEWS_COVER_IMAGE: "false"
          # 커버 이미지 env — news_blog.yml과 동일. 이 두 줄이 없으면 발행 글에
          # 이미지가 하나도 없어 홈피드/검색/공유 썸네일이 비어 나간다 (라이브 실측).
          AI_COVER_IMAGE_URL: ${{ secrets.AI_COVER_IMAGE_URL }}
          AI_DEFAULT_COVER_IMAGE_URL: "https://raw.githubusercontent.com/holyyomi/ai_google_blog/main/assets/ai-blog-cover-default.png"
          AI_IMAGE_UPLOAD_KEY: ${{ secrets.AI_IMAGE_UPLOAD_KEY }}
          IMGBB_API_KEY: ${{ secrets.IMGBB_API_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          # Naver Blog rewrite/publish is disabled, but Naver search is used as a free fact-source.
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
          ENABLE_NAVER_SEARCH: "true"
          ENABLE_NAVER_DATALAB: "true"
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          EXA_API_KEY: ${{ secrets.EXA_API_KEY }}
          FIRECRAWL_API_KEY: ${{ secrets.FIRECRAWL_API_KEY }}
          ENABLE_TAVILY_SEARCH: "true"
          ENABLE_EXA_SEARCH: "true"
          ENABLE_FIRECRAWL_SEARCH: "true"
          NEWS_TAVILY_MAX_REQUESTS: "3"
          NEWS_EXA_MAX_REQUESTS: "3"
          NEWS_FIRECRAWL_MAX_REQUESTS: "1"
          # 색인 즉시 요청 (Bing·Naver IndexNow) — 키 없으면 안전하게 skip
          NAVER_INDEXNOW_KEY: ${{ secrets.NAVER_INDEXNOW_KEY }}
          NAVER_INDEXNOW_KEY_LOCATION: ${{ secrets.NAVER_INDEXNOW_KEY_LOCATION }}
          # Blogger 발행 (publish 모드에서만 실제 사용)
          BLOGGER_CLIENT_ID: ${{ secrets.BLOGGER_CLIENT_ID }}
          BLOGGER_CLIENT_SECRET: ${{ secrets.BLOGGER_CLIENT_SECRET }}
          BLOGGER_REFRESH_TOKEN: ${{ secrets.BLOGGER_REFRESH_TOKEN }}
          BLOGGER_BLOG_ID: ${{ secrets.BLOGGER_BLOG_ID }}
          BLOGSPOT_HOME_URL: "https://holyyomiai.blogspot.com/"
          BLOG_BRAND_NAME: "holyyomi AI"
          BLOG_AUTHOR_NAME: "holyyomi AI"
          RUNS_DIR: "runs"
        run: |
          PYTHONPATH=src python src/blogspot_automation/cli_ai.py

      - name: List Runs Output
        if: ${{ always() }}
        run: |
          if [ -d runs ]; then
            find runs -maxdepth 3 -type f -print
          else
            echo "runs directory not found"
          fi

      - name: Ensure Runs Artifact Placeholder
        if: ${{ always() }}
        run: |
          mkdir -p runs
          if ! find runs -type f -print -quit | grep -q .; then
            {
              echo "No files were produced under runs/."
              date -u +"generated_at_utc=%Y-%m-%dT%H:%M:%SZ"
            } > runs/no_artifacts_found.txt
          fi

      - name: Upload AI Run Output
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: ai-run-output
          path: runs/
          if-no-files-found: warn

      # Keep publish history so recent-topic dedup works across scheduled runs.
      # 발행 이력 원장은 "어느 브랜치의 런이든" main 원장에 병합-커밋한다 (감사 로드맵 3).
      # 과거: main 런에서만 커밋(push HEAD:main이 브랜치 전체를 밀어버려 조건이 필요했음)
      # → feature 브랜치 리허설 발행이 원장에 안 남아 dedup·엔티티 쿨다운이 장님이 됐고
      # 같은 주제가 라이브에 연속으로 쌓였다(네이버 AI 3연속 사건 원인 b).
      # 지금: origin/main으로 체크아웃한 뒤 merge 스크립트(합집합·시간순)로 원장 "파일만"
      # 합류 → 브랜치 코드는 절대 main에 밀리지 않는다. 충돌은 rebase 대신 재병합 루프로
      # 해소(합집합이라 구조적으로 무충돌).
      - name: Persist Publish History (any branch -> main ledger)
        if: ${{ always() }}
        run: |
          if [ ! -f data/publish_history.json ]; then
            echo "no ledger produced; skipping"
            exit 0
          fi
          cp data/publish_history.json /tmp/run_ledger.json
          # 스크립트를 먼저 대피 — origin/main에 아직 없는 첫 배포 런에서도 동작해야 함
          cp scripts/merge_publish_history.py /tmp/merge_publish_history.py
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          for attempt in 1 2 3; do
            git checkout -f -B ledger-merge origin/main
            python /tmp/merge_publish_history.py \
              --base data/publish_history.json \
              --incoming /tmp/run_ledger.json \
              --out data/publish_history.json
            if git diff --quiet -- data/publish_history.json; then
              echo "ledger unchanged; skipping commit"
              exit 0
            fi
            git add data/publish_history.json
            git commit -m "chore: merge publish history from ${GITHUB_REF_NAME} run [skip ci]"
            if git push origin HEAD:main; then
              exit 0
            fi
            echo "push race detected; re-merging against fresh origin/main (attempt ${attempt})"
            git fetch origin main
          done
          echo "failed to persist ledger after 3 attempts" >&2
          exit 1

