name: holyyomi AI Topic Blog (manual)

# AiTopicPipeline(cli_ai.py) 전용 워크플로.
# 1단계(현재): 수동 실행만, 기본 dry_run → 실제 발행 없이 LLM 본문 품질을 artifact로 확인.
# 2단계(검증 후): schedule 블록을 추가해 매일 자동 발행으로 전환.
on:
  workflow_dispatch:
    inputs:
      publish_mode:
        description: 'AI publish mode'
        required: true
        default: 'dry_run'
        type: choice
        options:
          - dry_run
          - publish
      force_topic:
        description: 'Optional: 강제 주제(비우면 네이버/에버그린 소스 사용)'
        required: false
        default: ''
        type: string

concurrency:
  group: ai-blog-publish
  cancel-in-progress: false

jobs:
  ai_run:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run AI Topic Pipeline
        env:
          ENABLE_AI_PIPELINE: "true"
          DRY_RUN: ${{ github.event.inputs.publish_mode == 'publish' && 'false' || 'true' }}
          AUTO_PUBLISH: ${{ github.event.inputs.publish_mode == 'publish' && 'true' || 'false' }}
          AI_FORCE_TOPIC: ${{ github.event.inputs.force_topic }}
          # LLM 주제 특화 본문 생성
          ENABLE_AI_LLM_ENRICH: "true"
          GOOGLE_AI_API_KEY: ${{ secrets.GOOGLE_AI_API_KEY }}
          GEMINI_MODEL: "gemini-2.5-flash"
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: "gpt-5-mini"
          # 이미지 생성(Cloudflare 무료 1순위 → Gemini 2순위) → imgbb 영구 호스팅
          DISABLE_IMAGE_GENERATION: ${{ github.event.inputs.publish_mode == 'publish' && 'false' || 'true' }}
          DISABLE_IMAGE_UPLOAD: ${{ github.event.inputs.publish_mode == 'publish' && 'false' || 'true' }}
          ENABLE_COVER_IMAGE_AUTOGEN: "true"
          AI_IMAGE_UPLOAD_KEY: ${{ secrets.AI_IMAGE_UPLOAD_KEY }}
          IMGBB_API_KEY: ${{ secrets.IMGBB_API_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          # 네이버 소스(1순위) — 없으면 에버그린 폴백
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
          # Blogger 발행 (publish 모드에서만 실제 사용)
          BLOGGER_CLIENT_ID: ${{ secrets.BLOGGER_CLIENT_ID }}
          BLOGGER_CLIENT_SECRET: ${{ secrets.BLOGGER_CLIENT_SECRET }}
          BLOGGER_REFRESH_TOKEN: ${{ secrets.BLOGGER_REFRESH_TOKEN }}
          BLOGGER_BLOG_ID: ${{ secrets.BLOGGER_BLOG_ID }}
          BLOGSPOT_HOME_URL: "https://holyyomiai.blogspot.com/"
          BLOG_BRAND_NAME: "holyyomi AI"
          BLOG_AUTHOR_NAME: "holyyomi AI"
          RUNS_DIR: "runs"
        run: |
          PYTHONPATH=src python src/blogspot_automation/cli_ai.py

      - name: List Runs Output
        if: ${{ always() }}
        run: |
          if [ -d runs ]; then
            find runs -maxdepth 3 -type f -print
          else
            echo "runs directory not found"
          fi

      - name: Ensure Runs Artifact Placeholder
        if: ${{ always() }}
        run: |
          mkdir -p runs
          if ! find runs -type f -print -quit | grep -q .; then
            {
              echo "No files were produced under runs/."
              date -u +"generated_at_utc=%Y-%m-%dT%H:%M:%SZ"
            } > runs/no_artifacts_found.txt
          fi

      - name: Upload AI Run Output
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: ai-run-output
          path: runs/
          if-no-files-found: warn
