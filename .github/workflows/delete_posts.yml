name: Delete Blog Posts (manual)

# 일회성 수동 글 삭제. POST_IDS 입력(쉼표구분)으로 Blogger 글 삭제.
on:
  workflow_dispatch:
    inputs:
      post_ids:
        description: '삭제할 post id (쉼표구분)'
        required: true
        type: string

jobs:
  delete:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Delete Posts
        env:
          POST_IDS: ${{ github.event.inputs.post_ids }}
          BLOGGER_CLIENT_ID: ${{ secrets.BLOGGER_CLIENT_ID }}
          BLOGGER_CLIENT_SECRET: ${{ secrets.BLOGGER_CLIENT_SECRET }}
          BLOGGER_REFRESH_TOKEN: ${{ secrets.BLOGGER_REFRESH_TOKEN }}
          BLOGGER_BLOG_ID: ${{ secrets.BLOGGER_BLOG_ID }}
        run: |
          PYTHONPATH=src python scripts/delete_blog_posts.py
